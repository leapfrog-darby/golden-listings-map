", "t": "Condo", "p": 209900, "s": 773, "b": 2, "ba": 1.0, "g": "Unknown", "sch": "Welchester Elementary", "ar": "West Pleasant View", "ld": "2026-04-08", "st": "Condo for sale", "lat": 39.733697, "lng": -105.182747, "n": "", "u": "https://www.realtor.com/realestateandhomes-detail/16259-W-10th-Ave-Apt-E2_Golden_CO_80401_M20707-28641"}, {"a": "16359 W 10th Ave Apt X6", "t": "Condo", "p": 200000, "s": 773, "b": 2, "ba": 1.0, "g": "Unknown", "sch": "Welchester Elementary", "ar": "West Pleasant View", "ld": "2026-01-29", "st": "Pending", "lat": 39.733825, "lng": -105.183634, "n": "", "u": "https://www.realtor.com/realestateandhomes-detail/16359-W-10th-Ave-Apt-X6_Golden_CO_80401_M19265-80307"}];
const RUN = "2026-07-22";
document.getElementById('meta').textContent = DATA.length + " listings  ·  updated " + RUN;
const map = L.map('map').setView([39.745,-105.205], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'}).addTo(map);
const bounds = [];
function drawBoundary(q){
  return fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(q)+'&format=json&polygon_geojson=1&limit=1')
   .then(r=>r.json()).then(j=>{
     if(!j[0]) return;
     const layer = L.geoJSON(j[0].geojson,{style:{color:'#555',weight:2,fill:false,dashArray:'5,4'}}).addTo(map);
     bounds.push(layer.getBounds());
     const all = bounds.reduce((a,b)=>a.extend(b));
     map.fitBounds(all);
   }).catch(()=>{});
}
drawBoundary('Golden, Jefferson County, Colorado');
drawBoundary('West Pleasant View, Jefferson County, Colorado');
const COL = {'NEW':'#22a14b','PRICE DROP':'#e8710a','PRICE UP':'#c0392b','':'#2b6cb0'};
const money = n => '$' + n.toLocaleString();

// Many condos in the same complex (e.g. Golden Circle) carry identical coordinates, so their
// pins land exactly on top of each other and all but one become invisible. Fan any colliding
// pins out around a small ring so every listing is separately visible and clickable.
const groups = {};
DATA.forEach(d => { const k = d.lat.toFixed(5)+','+d.lng.toFixed(5); (groups[k] = groups[k] || []).push(d); });
function offset(d){
  const k = d.lat.toFixed(5)+','+d.lng.toFixed(5); const g = groups[k];
  if(g.length < 2) return [d.lat, d.lng];
  const i = g.indexOf(d), ang = 2*Math.PI*i/g.length, r = 0.00040;   // ~45 m ring
  return [d.lat + r*Math.sin(ang), d.lng + r*Math.cos(ang)/Math.cos(d.lat*Math.PI/180)];
}
// draw existing listings first, then price drops and new ones on top so highlights aren't buried
const order = {'':0,'PRICE DROP':1,'NEW':2};
[...DATA].sort((a,b)=>(order[a.n]||0)-(order[b.n]||0)).forEach(d=>{
  const [la,ln] = offset(d);
  const m = L.circleMarker([la,ln],{radius:9,color:'#fff',weight:2,fillColor:COL[d.n]||'#2b6cb0',fillOpacity:.95}).addTo(map);
  const ppsf = d.s ? money(Math.round(d.p/d.s)) + '/sqft' : '';
  const dom = Math.round((Date.now() - new Date(d.ld+'T00:00:00'))/86400000);
  m.bindPopup(`<div class="pop"><b>${d.a}</b><br>${d.t} · ${d.st} · ${d.ar}<br>
    <b>${money(d.p)}</b> ${ppsf?'· '+ppsf:''}<br>
    ${d.b} bd · ${d.ba} ba ${d.s?'· '+d.s.toLocaleString()+' sqft':''}<br>
    Garage: ${d.g}<br>Elementary: ${d.sch}<br>Listed ${d.ld} (${dom} days on market)<br>
    ${d.n?'<b style="color:'+(COL[d.n])+'">'+d.n+'</b><br>':''}
    <a href="${d.u}" target="_blank">View on Realtor.com</a></div>`);
  m.bindTooltip(`${d.a} · ${money(d.p)}`,{permanent:false,direction:'top'});
  if(d.n) m.bringToFront();
});
</script></body></html>
